name: Parallel Revdep Check (Custom)

on:
  workflow_dispatch:

jobs:
  revdep_check:
    runs-on: ubuntu-latest
    # We forceren de harde limiet van 6 uur, voor de zekerheid
    timeout-minutes: 360 
    strategy:
      fail-fast: false
      matrix:
        # We zetten 8 parallelle servers aan het werk
        chunk: [1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pandoc (nodig voor vignettes)
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          # Cruciaal: dit zorgt ervoor dat de 400 pakketten als binaries installeren (secondewerk)
          use-public-rspm: true 

      - name: Installeer Ubuntu systeem-afhankelijkheden
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev libharfbuzz-dev libfribidi-dev

      - name: Install pak & revdepcheck
        run: |
          install.packages("pak", repos = "https://cran.rstudio.com/")
          pak::pkg_install("r-lib/revdepcheck")
        shell: Rscript {0}

      - name: Run revdepcheck (Batch ${{ matrix.chunk }})
        env:
          CHUNK_ID: ${{ matrix.chunk }}
        run: |
          # 1. Haal live de nieuwste lijst met reverse dependencies op
          deps <- tools::package_dependencies("tinytest", reverse = TRUE, which = "most")$tinytest
          deps <- sort(unique(deps))
          
          # 2. Bepaal welk deel (chunk) deze specifieke server moet afhandelen
          n_chunks <- 8
          chunk_id <- as.numeric(Sys.getenv("CHUNK_ID"))
          chunks <- split(deps, cut(seq_along(deps), n_chunks, labels = FALSE))
          my_chunk <- chunks[[as.character(chunk_id)]]
          
          message("Start check voor batch ", chunk_id, " (", length(my_chunk), " pakketten)")
          
          # 3. Vertel revdepcheck dat hij alléén deze specifieke chunk moet testen
          revdepcheck::revdep_reset()
          revdepcheck::revdep_add(packages = my_chunk)
          
          # 4. Start de daadwerkelijke test (GitHub actions hebben 2 cores per stuk)
          revdepcheck::revdep_check(num_workers = 2)
        shell: Rscript {0}

      - name: Upload resultaten
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Bewaar de resultaten van elke batch onder een eigen naam
          name: revdep-results-batch-${{ matrix.chunk }}
          path: revdep/

