name: Parallel Revdep Check (400 pkgs)

on:
  workflow_dispatch:

jobs:
  revdep_check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # We maken 8 parallelle werkers aan
        batch: [1, 2, 3, 4, 5, 6, 7, 8]
    
    name: Batch ${{ matrix.batch }}
    uses: r-devel/recheck/.github/workflows/recheck.yml@v1
    with:
      which: 'most'
      # Hier plak je de output van het R-script onder de juiste nummers
      package: >-
        ${{ 
          matrix.batch == 1 && 'abclass, accumulate, aion, ALFAM2, alkahest, AMR, amt, ananke, anticlust, anytime, aphylo, AQEval, ArchaeoPhases, arkhe, arrg, astgrepr, automatedRecLin, autometric, backbone, banditpam, barrks, Bayesrel, BayesRep, BayesRepDesign, bdots, BEDMatrix, bfpwr, biglasso, biogas, blavaan, blocking, boostmath, bootGOF, bpvars, brar, brglm2, broadcast, bspm, bsvars, bsvarSIGNs, BVAR, BVARverse, canprot, cartography, carts, catalog, cdata, checkmate, chem16S, ChemoSpec' ||
          matrix.batch == 2 && 'ChemoSpec2D, ChemoSpecUtils, CHNOSZ, chronometre, chronosphere, cit, clarabel, classInt, climetrics, clubpro, CoDaImpact, comat, comprehenr, crochet, cronR, ctrdata, datareportR, datetimeutils, dauphin, dbarts, dcmodify, deductive, defm, Delaporte, depower, detectseparation, dfidx, digest, dimensio, DisImpact, distanceto, diveMove, divest, doconv, docxtractr, douconca, DTSg, dtts, ecic, EnvStats, epidata, epitraxr, epiworldR, ergmito, ess, et.nwfva, etwfe, facmodTS, factor256, factReg' ||
          matrix.batch == 3 && 'fastdid, fastshap, fastymd, faviconPlease, fisheye, flexiblas, fmcmc, fntl, formatdown, fritools, fritools2, funMoDisco, gbm, gdalcubes, gdm, geoarrowWidget, geojsonsf, geometries, gepaf, ggfixest, ggiraph, ggprism, ggspark, gimms, gower, gpkg, grattanInflators, GroupSeq, grpreg, gtfsio, gtrendsR, h3lib, h3r, hashr, havel, healthyAddress, highs, holiglm, howManyImputations, hutilscpp, icr, imaginarycss, imbibe, inlcolor, inline, inlpubs, inphr, install.load, interleave' ||
          matrix.batch == 4 && 'intsurv, irg, ironseed, isatabr, isopleuros, jagsUI, jti, kairos, khroma, kinesis, kknn, ksm, lamW, languageserversetup, LearnPCA, linemap, LinkedMatrix, lintools, lmhelprs, LMMsolver, longevity, longurl, lumberjack, maditr, MakefileR, manymome.table, mapiso, maplegend, mapsf, maptiles, mapview, marginaleffects, maxLik, MBBEFDLite, merDeriv, mesonet, metaRange, mets, mev, micsr, midfieldr, miesmuschel, mig, minimaxApprox, mmand, modelbpp, modelsummary, mschart, nanotime, ncvreg' ||
          matrix.batch == 5 && 'ndjson, neighbours, netplot, neverhpfilter, nexus, nloptr, NMOF, nngeo, nonprobsvy, od, ODataQuery, odyssey, OmicNavigator, opa, Orcs, ore, orgutils, osrm, owd, pack, packager, Pade, partialling.out, parttree, pcdid, pci, pdp, PerformanceAnalytics, phangorn, phosphoricons, phutil, phyloregion, piqp, pkgKitten, plmmr, PMwR, poorman, potential, ppRep, pqrfe, praznik, psychotree, qbinplots, QDiabetes, QR, quadprogXT, quantmod, QuickJSR, rankdifferencetest, rapr' ||
          matrix.batch == 6 && 'rassta, raster, Rblpapi, rbranding, Rcpp, RcppAnnoy, RcppArmadillo, RcppArray, RcppBlaze, RcppCCTZ, RcppClassic, RcppDynProg, RcppEigen, RcppFastAD, RcppFastFloat, RcppGSL, RcppInt64, RcppMagicEnum, rcppmlpackexamples, RcppRedis, RcppSimdJson, RcppTOML, RcppUUID, Rdatasets, rdbnomics, Rduckhts, reda, reformulas, remify, remstats, remstimate, remulate, replacer, reportr, restatapi, RestRserve, revss, rformat, rgeedim, rgeomorphon, rgexf, rgph, rjsoncons, rlas, RMCC, RNifti, RNiftyReg, roger, ROI.plugin.highs' ||
          matrix.batch == 7 && 'roundhouse, roxut, roxytest, RPhosFate, RProtoBuf, rqdatatable, RQuantLib, rquery, rspa, rspm, RTMB, runner, RWNN, scs, semnar, sergeant, settings, sgo, sigr, simPop, simputation, simTool, SimTOST, singleRcapture, slurmR, smetlite, soma, sparta, spatialreg, spdep, spectralR, spgwr, spiderbar, splines2, starsExtra, statebins, statgenGWAS, statgenHTP, statgenIBD, statgenMPP, statgenQTLxT, statlingua, StealLikeBayes, stringdist, subplex, subsampling, super, SurfRough, surveillance, SurvivalClusteringTree' ||
          'symDMatrix, synthesizer, tabula, tanaka, targeted, td, tdsa, terra, textutils, tiledb, tinycodet, tinylens, tinyplot, tinysnapshot, tinytable, tinytest2JUnit, toastui, topicmodels.etm, track2KBA, tractor.base, treePlotArea, treesitter.c, TruncatedNormal, tsdb, ttdo, twotrials, TwoWayFEWeights, uaparserjs, ulid, valh, validate, validatesuggest, vegperiod, vek, via, VIM, vip, visreg, vtreat, walkboutr, wand, webmap, whisper, wooldridge, wrapr, WVPlots, x12, xmlwriter, xts, ympes'
        }}

